
  # =========================
  # Datasource
  # =========================
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:booking_db}
spring.datasource.username=${DB_USER:booking_user}
spring.datasource.password=${DB_PASSWORD:BookingPass@2024}
  
  # =========================
  # HikariCP
  # =========================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
  
  # =========================
  # Redis
  # =========================
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:RedisPass@2024}
  
  # =========================
  # Kafka
  # =========================
spring.kafka.bootstrap-servers=kafka:9092
  
  # =========================
  # Mail
  # =========================
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
  
  # =========================
  # JPA
  # =========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
  
  # =========================
  # App
  # =========================
app.timezone=Asia/Ho_Chi_Minh
  
  # =========================
  # Keycloak
  # =========================
app.keycloak.url=${KC_URL:http://keycloak:8080}
app.keycloak.realm=${KC_REALM:booking}
app.keycloak.client-id=${KC_CLIENT_ID:booking-backend}
app.keycloak.client-secret=${KC_CLIENT_SECRET}
  
  # =========================
  # Security
  # =========================
app.security.api-key=${API_KEY:dev-api-key-abc123}
  
  # =========================
  # JWT
  # =========================
app.jwt.secret-key=${JWT_SECRET_KEY}
  
  # =========================
  # Token
  # =========================
app.tokenEntity.redis-ttl-hours=24
  
  # =========================
  # Logging
  # =========================
logging.level.com.booking=INFO
logging.level.org.hibernate=WARN
logging.level.org.springframework=WARN

