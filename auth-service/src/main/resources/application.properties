
spring.application.name=booking-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.web.resources.add-mappings=false
  
  # =========================
  # Kafka
  # =========================
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.group-id=booking-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
  
  # =========================
  # Mail
  # =========================
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:3087173ac5729b}
spring.mail.password=${MAIL_PASSWORD:2e2b905894f8bf}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
management.health.mail.enabled=false
  
  # =========================
  # Datasource
  # =========================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:booking_db}
spring.datasource.username=${DB_USER:booking_user}
spring.datasource.password=${DB_PASSWORD:BookingPass@2024}
spring.datasource.driver-class-name=org.postgresql.Driver
  
  # =========================
  # HikariCP
  # =========================
spring.datasource.hikari.pool-name=BookingHikariPool
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:20000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:300000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1200000}
spring.datasource.hikari.leak-detection-threshold=${HIKARI_LEAK_THRESHOLD:60000}
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=${HIKARI_VALIDATION_TIMEOUT:3000}
  
  # =========================
  # JPA
  # =========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=auth
spring.jpa.open-in-view=false
  
  # =========================
  # Flyway
  # =========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=auth,booking
spring.flyway.default-schema=auth
  
  # =========================
  # Redis
  # =========================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:RedisPass@2024}
spring.data.redis.timeout=3000ms
  
  # =========================
  # Multipart Upload
  # =========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}
spring.servlet.multipart.file-size-threshold=${FILE_SIZE_THRESHOLD:2MB}
  
  # =========================
  # Jackson
  # =========================
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
  
  # =========================
  # Server
  # =========================
server.port=${BACKEND_PORT:8081}
server.servlet.context-path=/api

server.tomcat.threads.max=${TOMCAT_MAX_THREADS:200}
server.tomcat.threads.min-spare=${TOMCAT_MIN_THREADS:10}
server.tomcat.connection-timeout=${TOMCAT_CONN_TIMEOUT:20000}
  
  # =========================
  # Actuator
  # =========================
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator
  
  # =========================
  # App
  # =========================
app.timezone=${TZ:Asia/Ho_Chi_Minh}
  
  # =========================
  # Keycloak
  # =========================
app.keycloak.url=${KC_URL:http://localhost:8180}
app.keycloak.realm=${KC_REALM:booking}
app.keycloak.client-id=${KC_CLIENT_ID:booking-backend}
app.keycloak.client-secret=${KC_CLIENT_SECRET:zniQwjbTkh7bCd0JvLuspVI1HyhuaWhU}
  
  # =========================
  # Security
  # =========================
app.security.api-key=${APP_API_KEY:dev-api-key-abc123}
app.security.encryption-key=${APP_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}
app.security.internal-key=${APP_INTERNAL_KEY:internal-secret-key-only-keycloak-knows}

app.security.max-failed-attempts=${MAX_FAILED_ATTEMPTS:5}
app.security.lock-duration-minutes=${LOCK_DURATION_MINUTES:15}

app.security.allowed-origins=${ALLOWED_ORIGINS:http://localhost:4200}
app.security.allowed-file-types=${ALLOWED_FILE_TYPES:image/jpeg,image/png,image/webp}
  
  # =========================
  # Token
  # =========================
app.tokenEntity.redis-ttl-hours=${REDIS_TTL_HOURS:720}
  
  # =========================
  # JWT
  # =========================
app.jwt.secret-key=${JWT_SECRET_KEY:ThisIsAVeryLongSecretKeyForJWTSigning2024BookingSystem!}
